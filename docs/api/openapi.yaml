components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
  schemas:
    Envelope:
      type: object
      properties:
        data: { type: object }
        error: { type: object }
        request_id: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    PreRegistrationRequest:
      type: object
      required: [full_name, email, phone]
      properties:
        full_name: { type: string }
        email: { type: string }
        phone: { type: string }
    PreRegistrationVerifyRequest:
      type: object
      required: [pre_registration_id, token]
      properties:
        pre_registration_id: { type: string }
        token: { type: string }
    PreRegistrationResponse:
      type: object
      properties:
        id: { type: string }
        status: { type: string }
        email_status: { type: string }
        phone_status: { type: string }
        email_verified: { type: boolean }
        phone_verified: { type: boolean }
        expires_at: { type: string }
        created_at: { type: string }
        updated_at: { type: string }
    PreRegistrationLookupResponse:
      type: object
      properties:
        state: { type: string }
        pre_registration:
          $ref: "#/components/schemas/PreRegistrationResponse"
    CreateTransactionRequest:
      type: object
      required: [account_id, user_id, type, amount]
      properties:
        account_id: { type: string }
        user_id: { type: string }
        type: { type: string }
        status: { type: string }
        amount: { type: integer }
        fee: { type: integer }
        net_amount: { type: integer }
        external_ref: { type: string }
        occurred_at: { type: string }
    ConfirmTransactionRequest:
      type: object
      required: [transaction_id]
      properties:
        transaction_id: { type: string }
    ReversalRequest:
      type: object
      required: [transaction_id]
      properties:
        transaction_id: { type: string }
        reason: { type: string }
    PixKeyRequest:
      type: object
      required: [user_id, account_id, type, key]
      properties:
        user_id: { type: string }
        account_id: { type: string }
        type: { type: string }
        key: { type: string }
    PixSendRequest:
      type: object
      required: [user_id, account_id, amount]
      properties:
        user_id: { type: string }
        account_id: { type: string }
        amount: { type: integer }
        fee: { type: integer }
        net_amount: { type: integer }
        external_ref: { type: string }
        metadata: { type: object }
    PixFromCryptoRequest:
      type: object
      required: [user_id, account_id, amount_brl, asset]
      properties:
        user_id: { type: string }
        account_id: { type: string }
        amount_brl: { type: integer }
        asset: { type: string }
        external_ref: { type: string }
    PaymentValidateRequest:
      type: object
      required: [barcode]
      properties:
        barcode: { type: string }
    PaymentScheduleRequest:
      type: object
      required: [user_id, account_id, amount]
      properties:
        user_id: { type: string }
        account_id: { type: string }
        amount: { type: integer }
        fee: { type: integer }
        net_amount: { type: integer }
        barcode: { type: string }
        scheduled_at: { type: string }
        due_date: { type: string }
        external_ref: { type: string }
    CardAuthorizeRequest:
      type: object
      required: [user_id, account_id, amount]
      properties:
        user_id: { type: string }
        account_id: { type: string }
        amount: { type: integer }
        fee: { type: integer }
        net_amount: { type: integer }
        merchant_name: { type: string }
        merchant_mcc: { type: string }
        auth_code: { type: string }
        external_ref: { type: string }
    SwapRequest:
      type: object
      required: [user_id, debit_account_id, credit_account_id, side, base_currency, quote_currency, price, quantity]
      properties:
        user_id: { type: string }
        debit_account_id: { type: string }
        credit_account_id: { type: string }
        side: { type: string }
        base_currency: { type: string }
        quote_currency: { type: string }
        price: { type: integer }
        quantity: { type: integer }
        fee: { type: integer }
        external_ref: { type: string }
        auto_execute: { type: boolean }
    CryptoPayRequest:
      type: object
      required: [user_id, fiat_amount, destination]
      properties:
        user_id: { type: string }
        fiat_amount: { type: integer }
        destination: { type: string }
    QuoteRequest:
      type: object
      required: [pair, price, ttl_seconds]
      properties:
        pair: { type: string }
        price: { type: integer }
        ttl_seconds: { type: integer }
        source: { type: string }
    AdminPlanRequest:
      type: object
      required: [code]
      properties:
        code: { type: string }
        description: { type: string }
        monthly_price_cents: { type: integer }
    AdminUserPlanRequest:
      type: object
      required: [user_id]
      properties:
        user_id: { type: string }
        plan_id: { type: string }
        plan_code: { type: string }
        valid_from: { type: string }
        valid_until: { type: string }
    AdminPricingRuleRequest:
      type: object
      required: [plan_id, user_type, operation_type, asset, fee_type, fee_value]
      properties:
        plan_id: { type: string }
        pricing_version_id: { type: string }
        user_type: { type: string }
        operation_type: { type: string }
        asset: { type: string }
        fee_type: { type: string }
        fee_value: { type: integer }
        min_fee: { type: integer }
        max_fee: { type: integer }
    KycLimitRequest:
      type: object
      required: [level, daily_limit, monthly_limit]
      properties:
        level: { type: string }
        daily_limit: { type: integer }
        monthly_limit: { type: integer }
    KycUpgradeRequest:
      type: object
      required: [user_id, level, status]
      properties:
        user_id: { type: string }
        level: { type: string }
        status: { type: string }
        provider_ref: { type: string }
    UserSettingsRequest:
      type: object
      required: [user_id]
      properties:
        user_id: { type: string }
        conversion_priority:
          type: array
          items: { type: string }
        allow_crypto_to_fiat: { type: boolean }
    CreateInvoiceRequest:
      type: object
      required: [user_id, amount_brl]
      properties:
        user_id: { type: string }
        amount_brl: { type: integer }
    PayInvoiceRequest:
      type: object
      required: [invoice_id, payer_user_id, payer_account_id, method]
      properties:
        invoice_id: { type: string }
        payer_user_id: { type: string }
        payer_account_id: { type: string }
        method: { type: string }
    WithdrawalRequest:
      type: object
      required: [user_id, account_id, amount]
      properties:
        user_id: { type: string }
        account_id: { type: string }
        amount: { type: integer }
        fee: { type: integer }
        net_amount: { type: integer }
        status: { type: string }
        external_ref: { type: string }
        occurred_at: { type: string }
